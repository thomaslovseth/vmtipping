name: Sync VM Results
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Kall sync-endepunkt
        run: |
          curl -s -X GET -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://vmtipping.vercel.app/api/sync-results
